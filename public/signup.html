<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — TaskFlow</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <a href="/" style="font-size:14px; color:#888; text-decoration:none; display:inline-block; margin-bottom:20px;">← Back to home</a>
      <h1>Create account</h1>
      <p class="auth-sub">Start organizing your tasks today</p>

      <div id="error-msg" class="error-msg" style="display:none;"></div>
      <div id="success-msg" class="success-msg" style="display:none;"></div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com"/>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters"/>
      </div>

      <button class="btn-primary" onclick="signup()">Create account</button>

      <p class="auth-link">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  // If came from pricing page, redirect back after signup
  const params = new URLSearchParams(window.location.search);
  if (params.get('redirect') === 'pricing') {
    sessionStorage.setItem('redirect', 'pricing');
  }
  </script>
  <script src="auth.js"></script>
</body>
</html>
